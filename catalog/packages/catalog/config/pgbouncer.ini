[databases]
catalog = host=catalog.postgres port=5432 user=postgres password=password dbname=catalog
catalog_slave = host=catalog.postgres port=5432 user=postgres password=password dbname=catalog
eligibility = host=eligibility.postgres port=5432 user=postgres password=password dbname=eligibility
eligibility_slave = host=eligibility.postgres port=5432 user=postgres password=password dbname=eligibility
inmate = host=inmate.postgres port=5432 user=postgres password=password dbname=inmate
inmate_slave = host=inmate.postgres port=5432 user=postgres password=password dbname=inmate

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =
user = postgres
auth_file = /etc/pgbouncer/userlist.txt
auth_type = md5
pool_mode = transaction
ignore_startup_parameters = extra_float_digits

# Log settings
admin_users = postgres
